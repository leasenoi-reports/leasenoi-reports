<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>LeaseNOI Review</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.app{display:flex;height:100vh;overflow:hidden;}
/* SIDEBAR */
.sidebar{width:280px;min-width:280px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.sidebar-header{padding:16px;border-bottom:1px solid #e2e8f0;flex-shrink:0;}
.sidebar-title{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sidebar-title-icon{font-size:20px;}
.search-box{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;color:#1e293b;outline:none;transition:border 0.2s;background:#f8fafc;}
.search-box:focus{border-color:#2563eb;background:#fff;}
.tab-bar{display:flex;gap:4px;margin-top:10px;}
.tab-btn{flex:1;padding:7px 8px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:#64748b;transition:all 0.15s;font-family:inherit;}
.tab-btn:hover{background:#f1f5f9;}
.tab-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.sidebar-list{flex:1;overflow-y:auto;padding:8px;}
.sidebar-count{font-size:11px;color:#94a3b8;padding:4px 12px 0;flex-shrink:0;}
/* PROPERTY ITEMS */
.prop-item{padding:11px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:2px solid transparent;transition:all 0.15s;position:relative;}
.prop-item:hover{background:#f1f5f9;}
.prop-item.selected{background:#eff6ff;border-color:#bfdbfe;}
.prop-item.has-response{border-left:3px solid #16a34a;}
.prop-item.no-response{border-left:3px solid #ef4444;}
.prop-name{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prop-owner{font-size:11px;color:#64748b;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prop-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.prop-date{font-size:10px;color:#94a3b8;}
.prop-status{font-size:10px;font-weight:500;padding:1px 5px;border-radius:4px;background:#f1f5f9;color:#64748b;}
.prop-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:auto;}
.badge-green{background:#dcfce7;color:#16a34a;}
.badge-red{background:#fee2e2;color:#ef4444;}
/* MAIN CONTENT */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.main-header{padding:16px 24px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;}
.main-title{font-size:18px;font-weight:700;color:#1e293b;}
.main-subtitle{font-size:13px;color:#64748b;margin-top:2px;}
.main-content{flex:1;overflow-y:auto;padding:24px;}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;text-align:center;gap:8px;}
.placeholder-icon{font-size:48px;}
.placeholder-text{font-size:16px;font-weight:600;}
.placeholder-sub{font-size:13px;color:#cbd5e1;}
/* STATS BAR */
.stats-bar{display:flex;gap:16px;padding:12px 0;flex-wrap:wrap;}
.stat-item{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 16px;flex:1;min-width:100px;}
.stat-value{font-size:22px;font-weight:700;color:#1e293b;}
.stat-label{font-size:11px;color:#64748b;margin-top:1px;}
.stat-green .stat-value{color:#16a34a;}
.stat-red .stat-value{color:#ef4444;}
.stat-blue .stat-value{color:#2563eb;}
/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:16px;max-width:820px;}
.timeline-card{border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);border:1px solid #e2e8f0;}
.card-header{padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.card-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#fff;}
.card-date{font-size:12px;color:rgba(255,255,255,0.85);}
.card-meta{font-size:11px;color:rgba(255,255,255,0.75);margin-left:auto;}
.card-body{background:#fff;padding:16px;}
.card-field{font-size:12px;color:#64748b;margin-bottom:6px;line-height:1.5;}
.card-field strong{color:#1e293b;font-weight:600;}
.card-body-text{font-size:13px;color:#334155;line-height:1.7;white-space:pre-wrap;word-break:break-word;margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9;}
.inquiry-header{background:#2563eb;}
.response-header{background:#16a34a;}
.followup-header{background:#7c3aed;}
/* TAG CHIPS */
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.tag-auto{background:#fef3c7;color:#d97706;}
.tag-personal{background:#d1fae5;color:#059669;}
.tag-tour{background:#ede9fe;color:#7c3aed;}
.tag-sms{background:#e0f2fe;color:#0284c7;}
.tag-voicemail{background:#f3e8ff;color:#9333ea;}
.tag-high{background:#dcfce7;color:#15803d;}
.tag-medium{background:#fef9c3;color:#a16207;}
/* TTR badge */
.ttr-badge{display:inline-flex;align-items:center;gap:4px;background:#f0fdf4;border:1px solid #86efac;color:#15803d;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-left:8px;}
/* META INFO PANEL */
.meta-panel{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:12px;color:#64748b;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.meta-panel strong{color:#1e293b;}
/* UNMATCHED CARDS */
.unmatched-card{border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid #e2e8f0;margin-bottom:12px;background:#fff;}
.unmatched-card-header{background:#f8fafc;padding:12px 16px;border-bottom:1px solid #f1f5f9;}
.unmatched-card-body{padding:12px 16px;}
.unmatched-from{font-size:13px;font-weight:600;color:#1e293b;}
.unmatched-email{font-size:11px;color:#64748b;margin-top:1px;}
.unmatched-subject{font-size:12px;font-weight:500;color:#334155;margin-top:6px;}
.unmatched-prop{font-size:11px;color:#7c3aed;font-weight:600;margin-top:4px;}
.unmatched-reason{font-size:11px;color:#94a3b8;margin-top:2px;}
/* NO RESULTS */
.no-results{text-align:center;padding:40px;color:#94a3b8;font-size:13px;}
/* Responsive */
@media(max-width:700px){
  .app{flex-direction:column;}
  .sidebar{width:100%;min-width:unset;height:45vh;border-right:none;border-bottom:1px solid #e2e8f0;}
  .main{height:55vh;}
  .stats-bar{gap:8px;}
  .stat-item{min-width:80px;padding:8px 10px;}
}
</style>

let currentTab = 'properties';
let selectedId = null;

function fmtDate(ts){
  if(!ts) return '√¢¬Ä¬î';
  try {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
  } catch(e){ return ts; }
}
function fmtDateFull(ts){
  if(!ts) return '√¢¬Ä¬î';
  try {
    const d = new Date(ts);
    return d.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
  } catch(e){ return ts; }
}
function diffHours(a,b){
  if(!a||!b) return null;
  const ms = new Date(b)-new Date(a);
  if(isNaN(ms)||ms<0) return null;
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  if(h>=48) return Math.round(h/24)+'d';
  if(h>=24) return Math.round(h/24)+'d '+m+'h';
  if(h>0) return h+'h '+m+'m';
  return m+'m';
}
function esc(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getChannel(row){
  if(row.is_sms_forward) return 'Text Message';
  if((row.response_type||'').toLowerCase().includes('voice')) return 'Voicemail';
  if((row.full_body||'').includes('voice.google.com/voicemail')) return 'Voicemail';
  if((row.body_snippet||'').toLowerCase().startsWith('google voice')) return 'Voicemail';
  return 'Email';
}
function makeTags(r){
  let t='';
  const ch = getChannel(r);
  if(ch==='Text Message') t+='<span class="tag tag-sms">√∞¬ü¬ì¬± SMS</span>';
  else if(ch==='Voicemail') t+='<span class="tag tag-voicemail">√∞¬ü¬ì¬û Voicemail</span>';
  else t+='<span class="tag" style="background:#f0f9ff;color:#0369a1;">√¢¬ú¬â√Ø¬∏¬è Email</span>';
  if(r.is_personal) t+='<span class="tag tag-personal">√∞¬ü¬ë¬§ Personal</span>';
  if(r.is_automated) t+='<span class="tag tag-auto">√∞¬ü¬§¬ñ Auto</span>';
  if(r.has_tour_push) t+='<span class="tag tag-tour">√∞¬ü¬ó¬ì√Ø¬∏¬è Tour Push</span>';
  t+='<span class="tag '+((r.match_confidence==='high')?'tag-high':'tag-medium')+'">'+esc(r.match_confidence)+'</span>';
  return t;
}

function switchTab(tab){
  currentTab=tab;
  selectedId=null;
  document.getElementById('tabProperties').classList.toggle('active',tab==='properties');
  document.getElementById('tabUnmatched').classList.toggle('active',tab==='unmatched');
  renderList();
  renderMain();
}

function renderList(){
  const q=(document.getElementById('searchBox').value||'').trim().toLowerCase();
  const container=document.getElementById('sidebarList');
  const countEl=document.getElementById('listCount');
  if(currentTab==='properties'){
    const items=APP_DATA.properties.filter(p=>
      !q||(p.property_name||'').toLowerCase().includes(q)||(p.owner||'').toLowerCase().includes(q)||(p.property_address||'').toLowerCase().includes(q));
    countEl.textContent=items.length+' properties'+(q?' matching':'');
    container.innerHTML=items.map(p=>{
      const rc=p.responses.length;
      const hasR=rc>0;
      const sel=p.id===selectedId?'selected':'';
      const statusColor=p.status==='expired'?'#94a3b8':p.status==='monitoring'?'#0284c7':'#16a34a';
      return '<div class="prop-item '+(hasR?'has-response':'no-response')+' '+sel+'" onclick="selectProperty('+p.id+')" role="button" tabindex="0">'+
        '<div class="prop-name">'+esc(p.property_name)+'</div>'+
        '<div class="prop-owner">'+esc(p.owner||'Unknown')+'</div>'+
        '<div class="prop-meta">'+
          '<span class="prop-date">'+fmtDate(p.submission_timestamp)+'</span>'+
          '<span class="prop-status" style="color:'+statusColor+'">'+esc(p.status||'')+'</span>'+
          '<span class="prop-badge '+(hasR?'badge-green':'badge-red')+'">'+rc+' resp.</span>'+
        '</div>'+
      '</div>';
    }).join('')||'<div class="no-results">No properties found</div>';
  } else {
    const items=APP_DATA.unmatched.filter(u=>
      !q||(u.from_name||'').toLowerCase().includes(q)||(u.subject||'').toLowerCase().includes(q)||(u.best_candidate_property_name||'').toLowerCase().includes(q));
    countEl.textContent=items.length+' unmatched'+(q?' matching':'');
    container.innerHTML=items.map(u=>{
      const sel=u.id===selectedId?'selected':'';
      return '<div class="prop-item no-response '+sel+'" onclick="selectUnmatched('+u.id+')" role="button" tabindex="0">'+
        '<div class="prop-name">'+esc(u.from_name||u.from_email)+'</div>'+
        '<div class="prop-owner">'+esc(u.subject||'(no subject)')+'</div>'+
        '<div class="prop-meta">'+
          '<span class="prop-date">'+fmtDate(u.received_at)+'</span>'+
          (u.best_candidate_property_name?'<span style="font-size:10px;color:#7c3aed;font-weight:500;">√∞¬ü¬è¬¢ '+esc(u.best_candidate_property_name)+'</span>':'')+
        '</div>'+
      '</div>';
    }).join('')||'<div class="no-results">No unmatched messages</div>';
  }
}
